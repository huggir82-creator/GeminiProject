<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Super To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <!-- CDN pour les confettis ! -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ma To-Do List 🚀</h1>
            <p>On va accomplir de grandes choses aujourd'hui !</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Qu'avez-vous prévu de faire ?" autocomplete="off">
                <button id="addTaskBtn">Ajouter</button>
            </div>

            <div class="stats-section">
                <span id="taskCount">0 tâche(s) restante(s)</span>
                <button id="clearAllBtn" class="secondary-btn">Tout effacer</button>
            </div>

            <ul id="taskList">
                <!-- Les tâches seront injectées ici par JavaScript -->
            </ul>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
